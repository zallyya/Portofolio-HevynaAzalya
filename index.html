        // =========================================================================
        // LOGIKA RENDER (Jangan diubah kecuali diperlukan)
        // =========================================================================
        
        function renderPublicGrid(data) {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = '';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm flex flex-col hover:shadow-md transition duration-300";
                
                // Cek apakah proyek memiliki link atau tidak
                const actionBtn = p.link ? 
                    `<a href="${p.link}" target="_blank" class="mt-auto inline-block text-center w-full bg-slate-900 text-white text-xs font-medium py-2 px-4 rounded hover:bg-blue-900 transition">Lihat Karya</a>` :
                    `<span class="mt-auto inline-block text-center w-full bg-slate-100 text-slate-400 text-xs font-medium py-2 px-4 rounded">Dokumen Internal / Tanpa Link</span>`;
                
                card.innerHTML = `
                    <img src="${p.thumb}" alt="${p.title}" class="w-full h-48 object-cover border-b border-slate-100" onerror="this.src='https://via.placeholder.com/400x250?text=Gambar+Belum+Ada'">
                    <div class="p-5 flex flex-col flex-grow">
                        <div class="flex items-center justify-between gap-2 mb-2">
                            <span class="bg-blue-50 text-blue-900 text-xs px-2.5 py-0.5 rounded-full font-semibold border border-blue-100">${p.category}</span>
                            <span class="text-xs text-slate-400">${p.date}</span>
                        </div>
                        <h3 class="text-base font-bold text-slate-900 mb-2 line-clamp-2">${p.title}</h3>
                        <p class="text-xs text-slate-600 line-clamp-3 mb-4 flex-grow">${p.desc}</p>
                        ${actionBtn}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderFilters() {
            const categories = ['All', ...new Set(projects.map(p => p.category))];
            const filterContainer = document.getElementById('category-filters');
            filterContainer.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `filter-btn px-4 py-2 text-sm font-medium rounded-md border border-slate-300 bg-white hover:bg-slate-100 transition ${cat === 'All' ? 'active' : ''}`;
                btn.innerText = cat === 'All' ? 'Semua Karya' : cat;
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderPublicGrid(cat === 'All' ? projects : projects.filter(p => p.category === cat));
                };
                filterContainer.appendChild(btn);
            });
        }

        // Jalankan fungsi saat pertama kali web dibuka
        renderPublicGrid(projects);
        renderFilters();
    </script>
</body>
</html>
